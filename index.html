<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crises">
<meta name="theme-color" content="#1b2230">
<title>Journal de crises</title>
<style>
  :root{
    --bg:#1b2230; --card:#252e40; --accent:#e0533d; --accent2:#3d7de0;
    --txt:#eef1f6; --muted:#9aa6bd; --ok:#4caf7d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    display:flex;flex-direction:column;min-height:100vh;
  }
  header{text-align:center;padding:20px 0 8px}
  header .count{font-size:46px;font-weight:800;line-height:1}
  header .label{color:var(--muted);font-size:15px;margin-top:6px}
  main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px}
  .bigbtn{
    width:200px;height:200px;border-radius:50%;border:none;
    background:radial-gradient(circle at 50% 35%,#ef6a55,var(--accent));
    color:#fff;font-size:24px;font-weight:800;letter-spacing:.5px;
    box-shadow:0 12px 30px rgba(224,83,61,.45);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .bigbtn .plus{font-size:54px;line-height:.7;font-weight:300}
  .bigbtn:active{transform:scale(.94);box-shadow:0 6px 18px rgba(224,83,61,.4)}
  .last{color:var(--muted);font-size:14px;text-align:center;min-height:20px}
  .toast{
    position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 12px);transform:translateX(-50%);
    background:var(--ok);color:#fff;padding:10px 18px;border-radius:30px;font-weight:600;
    opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1}
  .row{display:flex;gap:10px;width:100%;max-width:420px}
  .ghost{
    flex:1;background:var(--card);color:var(--txt);border:none;border-radius:14px;
    padding:14px;font-size:15px;font-weight:600;cursor:pointer;
  }
  .ghost:active{opacity:.7}

  /* Sheets */
  .sheet{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:flex-end;z-index:40;
  }
  .sheet.open{display:flex}
  .sheet .panel{
    background:var(--bg);width:100%;border-radius:20px 20px 0 0;padding:18px 16px;
    padding-bottom:calc(18px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto;
    animation:slideup .25s ease;
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .panel h2{margin:4px 0 16px;font-size:19px;text-align:center}
  label{display:block;color:var(--muted);font-size:13px;margin:12px 0 5px}
  input,textarea{
    width:100%;background:var(--card);border:1px solid #33405a;border-radius:12px;
    color:var(--txt);font-size:16px;padding:12px;font-family:inherit;
  }
  textarea{resize:vertical;min-height:60px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .chip{
    background:var(--card);border:1px solid #33405a;border-radius:20px;
    padding:8px 14px;font-size:14px;cursor:pointer;
  }
  .chip.sel{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .actions{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.sec{background:var(--card);color:var(--txt)}

  /* Bilan */
  .month{display:flex;align-items:center;gap:10px;margin:8px 0}
  .month .m{width:74px;color:var(--muted);font-size:14px}
  .month .bar{height:22px;background:var(--accent2);border-radius:6px;min-width:4px}
  .month .n{font-weight:700}
  .crise{
    background:var(--card);border-radius:12px;padding:10px 12px;margin:8px 0;font-size:14px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
  }
  .crise .meta{color:var(--muted);font-size:12px;margin-top:3px}
  .crise .del{color:var(--accent);background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px}
  .empty{color:var(--muted);text-align:center;padding:30px 0}
  .hint{color:var(--muted);font-size:12px;text-align:center;margin-top:10px;line-height:1.4}
  .backup{
    display:flex;align-items:center;gap:10px;background:#3a2e1a;border:1px solid #6b5320;
    border-radius:14px;padding:12px 14px;max-width:420px;width:100%;font-size:14px;
  }
  .backup span{flex:1;color:#f0d28a}
  .backup button{
    background:#e0a93d;color:#1b2230;border:none;border-radius:10px;
    padding:9px 14px;font-weight:700;cursor:pointer;white-space:nowrap;
  }
</style>
</head>
<body>
<div class="toast" id="toast">✓ Crise enregistrée</div>

<header>
  <div class="count" id="count">0</div>
  <div class="label" id="monthLabel">crise ce mois-ci</div>
</header>

<main>
  <button class="bigbtn" id="addBtn">
    <span class="plus">+</span>
    <span>CRISE</span>
  </button>
  <div class="last" id="last"></div>
  <div class="backup" id="backupBanner" style="display:none">
    <span id="backupMsg">Pense à sauvegarder vers Proton</span>
    <button id="backupNow">Sauvegarder</button>
  </div>
  <div class="row">
    <button class="ghost" id="detailsBtn">＋ Détails</button>
    <button class="ghost" id="bilanBtn">📊 Bilan</button>
  </div>
</main>

<!-- Sheet: saisie détaillée -->
<div class="sheet" id="formSheet">
  <div class="panel">
    <h2 id="formTitle">Détails de la crise</h2>
    <label>Date</label><input type="date" id="fDate">
    <label>Heure</label><input type="time" id="fHeure">
    <label>Durée (minutes)</label><input type="number" id="fDuree" step="0.5" min="0" inputmode="decimal" placeholder="ex. 2">
    <label>Type de crise</label>
    <input type="text" id="fType" placeholder="ex. endormissement…">
    <div class="chips" id="typeChips"></div>
    <label>Intensité</label>
    <input type="text" id="fIntensite" placeholder="légère / modérée / forte">
    <div class="chips" id="intChips"></div>
    <label>Note</label>
    <textarea id="fNote" placeholder="fatigue, oubli de médicament, contexte…"></textarea>
    <div class="actions">
      <button class="btn sec" id="formCancel">Annuler</button>
      <button class="btn primary" id="formSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Sheet: bilan -->
<div class="sheet" id="bilanSheet">
  <div class="panel">
    <h2>Bilan</h2>
    <div id="bilanMonths"></div>
    <div id="bilanList"></div>
    <div class="actions">
      <button class="btn sec" id="exportBtn">⬇ Exporter (CSV)</button>
      <button class="btn primary" id="bilanClose">Fermer</button>
    </div>
    <div class="hint">L'export ouvre le menu de partage : choisis <b>Proton Drive</b> (ou « Enregistrer dans Fichiers »). À partager en lecture à ta neurologue.</div>
  </div>
</div>

<script>
const KEY = "crises_epi";
const TYPES = ["Endormissement","Hors endormissement","Mouvement électrique parasite"];
const INTENSITES = ["légère","modérée","forte"];
let editId = null;

const load = () => { try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} };
const save = (a) => localStorage.setItem(KEY, JSON.stringify(a));
const pad = n => String(n).padStart(2,"0");
const moisFR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

function currentMonthKey(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }

function render(){
  const all = load();
  const mk = currentMonthKey();
  const n = all.filter(c=>c.date.startsWith(mk)).length;
  count.textContent = n;
  const [y,m] = mk.split("-");
  monthLabel.textContent = `crise${n>1?"s":""} en ${moisFR[+m-1]} ${y}`;
  const sorted = [...all].sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  const lastC = sorted[sorted.length-1];
  last.textContent = lastC ? `Dernière : ${frDate(lastC.date)} à ${lastC.heure}` : "Aucune crise enregistrée";
  updateBackupBanner();
}

function frDate(d){ const [y,mo,da]=d.split("-"); return `${+da} ${moisFR[+mo-1]}`; }

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1600);
}

// Tap rapide : enregistre maintenant
addBtn.addEventListener("click",()=>{
  const d=new Date();
  const all=load();
  all.push({id:Date.now(),date:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
            heure:`${pad(d.getHours())}:${pad(d.getMinutes())}`,duree:"",type:"",intensite:"",note:""});
  save(all); render();
  if(navigator.vibrate) navigator.vibrate(40);
  toast("✓ Crise enregistrée");
});

// --- Formulaire détaillé ---
function buildChipGroup(container,values,input){
  container.innerHTML="";
  values.forEach(t=>{
    const c=document.createElement("span"); c.className="chip"; c.textContent=t;
    c.onclick=()=>{ input.value=(input.value===t?"":t); refreshChips(); };
    container.appendChild(c);
  });
}
function buildChips(){ buildChipGroup(typeChips,TYPES,fType); buildChipGroup(intChips,INTENSITES,fIntensite); }
function refreshChips(){
  [...typeChips.children].forEach(c=>c.classList.toggle("sel",c.textContent===fType.value));
  [...intChips.children].forEach(c=>c.classList.toggle("sel",c.textContent===fIntensite.value));
}

function openForm(crise){
  editId = crise ? crise.id : null;
  formTitle.textContent = crise ? "Modifier la crise" : "Nouvelle crise (détails)";
  const d=new Date();
  fDate.value = crise?crise.date:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  fHeure.value= crise?crise.heure:`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  fDuree.value= crise?crise.duree:"";
  fType.value = crise?(crise.type||""):"";
  fIntensite.value = crise?(crise.intensite||""):"";
  fNote.value = crise?(crise.note||""):"";
  refreshChips();
  formSheet.classList.add("open");
}
detailsBtn.onclick=()=>{
  // par défaut : éditer la dernière crise si elle existe, sinon nouvelle
  const all=load().sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  openForm(all[all.length-1]||null);
};
formCancel.onclick=()=>formSheet.classList.remove("open");
formSave.onclick=()=>{
  const all=load();
  const obj={date:fDate.value,heure:fHeure.value,duree:fDuree.value,type:fType.value.trim(),intensite:fIntensite.value.trim(),note:fNote.value.trim()};
  if(!obj.date||!obj.heure){ toast("Date et heure requises"); return; }
  if(editId){ const i=all.findIndex(c=>c.id===editId); if(i>=0) all[i]={...all[i],...obj}; }
  else { all.push({id:Date.now(),...obj}); }
  save(all); render(); formSheet.classList.remove("open"); toast("✓ Enregistré");
};

// --- Bilan ---
bilanBtn.onclick=()=>{ buildBilan(); bilanSheet.classList.add("open"); };
bilanClose.onclick=()=>bilanSheet.classList.remove("open");

function buildBilan(){
  const all=load();
  const byMonth={};
  all.forEach(c=>{const k=c.date.slice(0,7);byMonth[k]=(byMonth[k]||0)+1});
  const keys=Object.keys(byMonth).sort().reverse();
  const max=Math.max(1,...Object.values(byMonth));
  bilanMonths.innerHTML = keys.length? keys.map(k=>{
    const [y,m]=k.split("-");
    return `<div class="month"><span class="m">${moisFR[+m-1].slice(0,4)} ${y.slice(2)}</span>
      <span class="bar" style="width:${byMonth[k]/max*160}px"></span>
      <span class="n">${byMonth[k]}</span></div>`;
  }).join("") : `<div class="empty">Aucune crise enregistrée.</div>`;

  const sorted=[...all].sort((a,b)=>(b.date+b.heure).localeCompare(a.date+a.heure));
  bilanList.innerHTML = sorted.map(c=>`
    <div class="crise">
      <div>
        <b>${frDate(c.date)} · ${c.heure}</b>
        <div class="meta">${[c.duree?c.duree+" min":"",c.type,c.intensite,c.note].filter(Boolean).join(" · ")||"—"}</div>
      </div>
      <button class="del" data-id="${c.id}">🗑</button>
    </div>`).join("");
  bilanList.querySelectorAll(".del").forEach(b=>b.onclick=()=>{
    if(confirm("Supprimer cette crise ?")){
      save(load().filter(c=>c.id!=b.dataset.id)); render(); buildBilan();
    }
  });
}

// --- Export CSV (même format que crises.csv) ---
const BKEY="crises_last_backup";
function csvCell(v){ v=(v??"").toString(); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildCSV(){
  const all=load().sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  let csv="date,heure,duree_min,type,intensite,note\n";
  all.forEach(c=>{csv+=[c.date,c.heure,c.duree,c.type,c.intensite,c.note].map(csvCell).join(",")+"\n";});
  return csv;
}
async function exportCSV(){
  if(load().length===0){ toast("Aucune crise à sauvegarder"); return; }
  const csv=buildCSV();
  const nom="crises_"+new Date().toISOString().slice(0,10)+".csv";
  const file=new File([csv],nom,{type:"text/csv"});
  // iPhone : ouvre le menu de partage natif (Proton Drive, Fichiers, Mail…)
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:"Journal de crises"}); markBackup(); return; }
    catch(e){ if(e.name==="AbortError") return; } // annulé par l'utilisateur
  }
  // Repli (ordinateur) : téléchargement classique
  const a=document.createElement("a");
  a.href=URL.createObjectURL(file); a.download=nom; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  markBackup();
}
function markBackup(){ localStorage.setItem(BKEY,Date.now()); render(); toast("✓ Sauvegarde lancée"); }
exportBtn.onclick=exportCSV;
backupNow.onclick=exportCSV;

// Rappel de sauvegarde : si des crises non sauvegardées depuis > 7 jours
function updateBackupBanner(){
  const all=load();
  if(all.length===0){ backupBanner.style.display="none"; return; }
  const last=+localStorage.getItem(BKEY)||0;
  const jours=Math.floor((Date.now()-last)/86400000);
  if(!last){
    backupMsg.textContent="Pense à sauvegarder vers Proton (jamais sauvegardé)";
    backupBanner.style.display="flex";
  }else if(jours>=7){
    backupMsg.textContent=`Dernière sauvegarde il y a ${jours} jours — pense à sauvegarder`;
    backupBanner.style.display="flex";
  }else{
    backupBanner.style.display="none";
  }
}

buildChips(); render();
</script>
</body>
</html>
